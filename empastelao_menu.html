<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú El Empastelao - Haz tu Pedido</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Lato:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/custom.css">

    <script src="js/app.js" defer></script>
</head>

<body>
    <!-- Navbar consistent with index.html -->
    <nav class="navbar" id="navbar">
        <a href="index.html" class="navbar-brand">El <span>Empastelao</span></a>
        <ul class="nav-links">
            <li><a href="index.html#especialidades" class="nav-link">Especialidades</a></li>
            <li><a href="empastelao_menu.html" class="nav-link">Menú</a></li>
            <li><a href="menueventos.html" class="nav-link">Eventos</a></li>
        </ul>
    </nav>

    <main class="container" style="padding-top: 120px;">
        <span class="section-subtitle" style="text-align: center; display: block;">Delicias al instante</span>
        <h1 style="text-align: center; margin-bottom: 40px;">Nuestro Menú</h1>

        <!-- App.js will render categories and products here -->
        <div id="products-render-target"></div>
    </main>

    <!-- Footer consistent with index.html -->
    <footer style="margin-top: 80px;">
        <div class="footer-content">
            <div class="footer-section">
                <h3>El Empastelao</h3>
                <p>Tradición y sabor caribeño en cada bocado.</p>
            </div>
            <div class="footer-section">
                <h3>Contacto</h3>
                <ul class="footer-links">
                    <li><a href="tel:+573043037526" class="footer-link">📞 +57 304 303 7526</a></li>
                    <li><a href="https://wa.me/573043037526" target="_blank" class="footer-link">📱 WhatsApp</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-divider"></div>
        <div class="footer-copyright">
            © 2024 El Empastelao.
        </div>
    </footer>

    <script>
        // Navbar effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
</body>

</html>
